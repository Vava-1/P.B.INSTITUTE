# Railway deployment config.
# See: https://docs.railway.app/deploy/config-as-code

[deploy]
# Healthcheck path — Railway polls this to know when the app is ready.
healthcheckPath = "/health"
# Give the container 60s to start (drizzle-kit push + node boot).
healthcheckTimeout = 60
# Railway will restart the container if the healthcheck fails this many times.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# No preDeploy hooks needed — the Dockerfile CMD runs `drizzle-kit push`
# before `node dist/boot.js` on every container start. This ensures the
# DB schema is always in sync with schema.ts on every deploy.
